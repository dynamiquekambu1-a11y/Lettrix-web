<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>💼 Lettrix Web</title>

    <style>
        body {
            background-color: #1e1e2f;
            color: #f0f0f0;
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: #f6d32d; }
        form { max-width: 900px; margin: auto; }
        label { display: block; margin-top: 12px; }
        input, select, textarea {
            width: 100%; padding: 6px; margin-top: 4px;
            background-color: #2c2c3c; border: 1px solid #444; color: #f0f0f0;
        }
        textarea { height: 250px; resize: vertical; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        button {
            background-color: #6f42c1; border: none; padding: 10px 16px;
            color: white; font-weight: bold; cursor: pointer;
        }
        button.export { background-color: #0f5ad0; }
        .disabled { background-color: #555 !important; cursor: not-allowed !important; }

        /* BARRE PRO + DON */
        .top-buttons {
            text-align: center; margin-bottom: 20px;
        }
        .top-buttons button {
            margin: 6px; background-color: #ffca28; padding: 10px 20px;
            color: #000; font-weight: bold; border: none; cursor: pointer;
        }

        /* Compteur */
        .info-box {
            margin: auto; text-align: center; padding: 8px;
            width: 300px; border-radius: 6px; margin-bottom: 15px;
            font-weight: bold;
        }
        .green { background: #2e7d32; }
        .yellow { background: #f9a825; }
        .red { background: #c62828; }
    </style>
</head>
<body>
<div class="top-buttons">
    <button onclick="alert('Fonction PRO bientôt disponible')">⭐ Passer en PRO</button>

    <!-- ❤️ BOUTON DON VIA WHATSAPP -->
    <button onclick="window.open('https://wa.me/27750556027?text=Bonjour%2C%20je%20souhaite%20soutenir%20Lettrix%20❤️','_blank')">
        💬 Donner via WhatsApp
    </button>
</div>



    <h1>💼 Lettrix Web — Générateur de Lettres</h1>

    <!-- 🔥 Compteur d’export -->
    <div class="info-box
         {% if remaining == 2 %}green{% elif remaining == 1 %}yellow{% else %}red{% endif %}">
        {% if remaining > 0 %}
            {{ remaining }} export(s) restant(s) aujourd’hui
        {% else %}
            🚫 Limite atteinte — Revenez demain ❤️
        {% endif %}
    </div>

    <!-- 🔥 TON FORMULAIRE EXACT — NON MODIFIÉ -->
    <form method="POST" action="/generer">

        <div class="row">
            <div class="col">
                <label>Nom / Prénom :</label>
                <input type="text" name="nom" value="{{ lettre.nom if lettre else '' }}">

                <label>Destinataire (nom) :</label>
                <input type="text" name="destinataire" value="{{ lettre.destinataire if lettre else '' }}">

                <label>Entreprise :</label>
                <input type="text" name="nom_entreprise" value="{{ lettre.nom_entreprise if lettre else '' }}">

                <label>Domaine :</label>
                <input type="text" name="domaine" value="{{ lettre.domaine if lettre else '' }}">

                <label>Objet :</label>
                <input type="text" name="objet" value="{{ lettre.objet if lettre else '' }}">
            </div>

            <div class="col">
                <label>Expéditeur — Adresse :</label>
                <input type="text" name="exp_adresse" value="{{ lettre.exp_adresse if lettre else '' }}">

                <label>CP :</label>
                <input type="text" name="exp_cp" value="{{ lettre.exp_cp if lettre else '' }}">

                <label>Ville :</label>
                <input type="text" name="exp_ville" value="{{ lettre.exp_ville if lettre else '' }}">

                <label>Email :</label>
                <input type="text" name="exp_email" value="{{ lettre.exp_email if lettre else '' }}">

                <label>Téléphone :</label>
                <input type="text" name="exp_tel" value="{{ lettre.exp_tel if lettre else '' }}">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Destinataire — Adresse :</label>
                <input type="text" name="dest_adresse" value="{{ lettre.dest_adresse if lettre else '' }}">

                <label>CP :</label>
                <input type="text" name="dest_cp" value="{{ lettre.dest_cp if lettre else '' }}">

                <label>Ville :</label>
                <input type="text" name="dest_ville" value="{{ lettre.dest_ville if lettre else '' }}">
            </div>

            <div class="col">
                <label>Signature :</label>
                <input type="text" name="signature" value="{{ lettre.signature if lettre else '' }}">
            </div>
        </div>

        <div class="radio-group">
            <label>Genre :</label>
            <label><input type="radio" name="genre" value="m" {% if lettre and lettre.genre=='m' %}checked{% endif %}> Masculin</label>
            <label><input type="radio" name="genre" value="f" {% if lettre and lettre.genre=='f' %}checked{% endif %}> Féminin</label>
        </div>

        <div class="radio-group">
            <label>Catégorie :</label>
            <label><input type="radio" name="categorie" value="stage" {% if lettre and lettre.categorie=='stage' %}checked{% endif %}> Stage</label>
            <label><input type="radio" name="categorie" value="motivation" {% if lettre and lettre.categorie=='motivation' %}checked{% endif %}> Motivation</label>
            <label><input type="radio" name="categorie" value="administration" {% if lettre and lettre.categorie=='administration' %}checked{% endif %}> Administration</label>
        </div>

        <div class="radio-group">
            <label>Style :</label>
            <label><input type="radio" name="style" value="simple" {% if lettre and lettre.style=='simple' %}checked{% endif %}> Simple</label>
            <label><input type="radio" name="style" value="professionnel" {% if lettre and lettre.style=='professionnel' %}checked{% endif %}> Professionnel</label>
        </div>

        <div class="buttons">
            <button type="submit">🪶 Générer</button>

            <button formaction="/preview" formmethod="POST" class="export">📄 Preview</button>
        </div>

        <label>Texte généré :</label>
        <textarea readonly>{{ lettre.texte if lettre else '' }}</textarea>
    </form>

    <!-- 🔥 Désactivation auto si limite dépassée -->
    {% if not can_export %}
    <script>
        document.querySelectorAll('button.export').forEach(btn => {
            btn.classList.add('disabled');
            btn.disabled = true;
        });
    </script>
    {% endif %}

</body>
</html>
